<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean chat thingy</title>
<style>
  :root{
    --bg:transparent;
    --card:linear-gradient(180deg, rgba(38,102,145,.42), rgba(24,78,118,.34));
    --card-solid:rgba(28,86,128,.42);
    --card-strong:rgba(18,63,98,.52);
    --stroke:rgba(190,237,255,.17);
    --stroke-strong:rgba(171,229,255,.28);
    --text:#eefbff;
    --muted:rgba(227,246,255,.72);
    --brand:#67b7ff;
    --brand-2:#4f8cff;
    --danger:#ff6b63;
    --ok:#42d392;
    --warn:#ffd166;
    --shadow:0 24px 60px rgba(9,32,48,.22),0 8px 22px rgba(8,35,52,.14);
    --r:22px;
    --glass-blur:18px;
  }

  *{box-sizing:border-box;}

  html,body{
    height:100%;
    background:transparent;
  }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:transparent;
    display:flex;
    justify-content:center;
    padding:14px;
    text-rendering:optimizeLegibility;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    width:100%;
    max-width:1100px;
    display:flex;
    gap:16px;
    align-items:flex-start;
  }

  .mainCol{ flex:1; min-width:0; }
  .sideCol{ width:360px; flex:0 0 360px; min-width:320px; }

  @media (max-width:980px){
    .wrap{ flex-direction:column; }
    .sideCol{ width:100%; flex:1 1 auto; min-width:0; }
  }

  .wrap.centered{ justify-content:center; }
  .wrap.centered .sideCol{ display:none; }
  .wrap.centered .mainCol{ max-width:900px; }

  .card{
    position:relative;
    background:var(--card);
    border:1px solid var(--stroke);
    border-radius:var(--r);
    box-shadow:var(--shadow);
    backdrop-filter:blur(var(--glass-blur)) saturate(135%);
    -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(135%);
    overflow:hidden;
    isolation:isolate;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    padding:1px;
    background:linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.04), rgba(111,210,255,.18));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
    opacity:.95;
  }

  .card::after{
    content:"";
    position:absolute;
    inset:auto -8% 65% -8%;
    height:130px;
    background:radial-gradient(circle at top, rgba(194,244,255,.14), transparent 65%);
    pointer-events:none;
  }

  .hdr{
    padding:14px 16px;
    border-bottom:1px solid rgba(213,245,255,.11);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  }

  .hdr .title{
    font-weight:900;
    letter-spacing:.2px;
    text-shadow:0 1px 0 rgba(255,255,255,.06);
  }

  .hdr .sub{
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
  }

  .sectionTitle{
    font-size:12px;
    letter-spacing:.22px;
    text-transform:uppercase;
    color:rgba(232,249,255,.76);
    margin-bottom:8px;
    font-weight:900;
  }

  .pillRow{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .pill{
    font-size:12px;
    padding:7px 11px;
    border-radius:999px;
    border:1px solid rgba(218,246,255,.12);
    background:rgba(230,248,255,.07);
    color:var(--muted);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }

  .pill.admin{
    border-color:rgba(97,182,255,.26);
    background:linear-gradient(180deg, rgba(103,183,255,.24), rgba(76,123,255,.14));
    color:#fff;
  }

  .btn{
    border:none;
    border-radius:14px;
    padding:10px 14px;
    font-weight:900;
    cursor:pointer;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    color:white;
    font-size:13px;
    box-shadow:0 10px 24px rgba(79,140,255,.22), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .14s ease, box-shadow .18s ease, filter .18s ease, opacity .18s ease;
  }

  .btn:hover{ transform:translateY(-1px); box-shadow:0 14px 28px rgba(79,140,255,.28), inset 0 1px 0 rgba(255,255,255,.16); filter:brightness(1.03); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn.ghost{
    background:rgba(227,248,255,.09);
    color:var(--text);
    border:1px solid rgba(214,245,255,.10);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  }

  .btn.danger{ background:linear-gradient(135deg,#ff7d73,#ff665c); }
  .btn.ok{ background:linear-gradient(135deg,#50d8a0,#2bc987); }
  .small{ padding:8px 10px; border-radius:12px; font-size:12px; }

  .body{
    height:min(72vh,720px);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  #messages{
    flex:1;
    overflow-y:auto;
    padding:14px 14px 10px;
    scroll-behavior:smooth;
    overscroll-behavior:contain;
    contain:layout style paint;
    scrollbar-width:thin;
    scrollbar-color:rgba(203,242,255,.44) transparent;
  }

  #messages::-webkit-scrollbar,
  #usersList::-webkit-scrollbar{ width:10px; }
  #messages::-webkit-scrollbar-track,
  #usersList::-webkit-scrollbar-track{ background:transparent; }
  #messages::-webkit-scrollbar-thumb,
  #usersList::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg, rgba(198,241,255,.5), rgba(121,192,226,.42));
    border-radius:999px;
    border:2px solid transparent;
    background-clip:padding-box;
  }

  .msg{
    position:relative;
    padding:12px 14px;
    border-radius:18px;
    border:1px solid rgba(213,245,255,.10);
    background:linear-gradient(180deg, rgba(7,40,67,.39), rgba(4,32,56,.31));
    margin:10px 0;
    content-visibility:auto;
    contain-intrinsic-size:84px;
    box-shadow:0 8px 22px rgba(6,27,42,.12), inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter:blur(8px) saturate(130%);
    -webkit-backdrop-filter:blur(8px) saturate(130%);
    transform:translateY(10px);
    opacity:0;
    animation:msgIn .28s ease forwards;
  }

  .msg::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    background:linear-gradient(135deg, rgba(255,255,255,.055), transparent 34%, rgba(150,231,255,.03));
    pointer-events:none;
  }

  @keyframes msgIn{
    to{ transform:translateY(0); opacity:1; }
  }

  .msg:hover{
    background:linear-gradient(180deg, rgba(9,48,79,.45), rgba(7,38,64,.36));
    border-color:rgba(213,245,255,.14);
  }

  .meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted);
    margin-bottom:7px;
    gap:10px;
  }

  .nameRow{ display:flex; align-items:center; gap:8px; min-width:0; }
  .name{ font-weight:900; color:#c9f2ff; }

  .tag{
    font-size:11px;
    font-weight:900;
    padding:4px 8px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }

  .tag.unv{ border-color:rgba(255,107,99,.26); background:rgba(255,107,99,.10); color:#ffe1de; }
  .tag.v{ border-color:rgba(66,211,146,.28); background:rgba(66,211,146,.12); color:#dffbf0; }

  .text{
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.42;
    color:#effbff;
  }

  .adminMsgRow{ margin-top:8px; display:flex; justify-content:flex-end; gap:8px; }

  .composer{
    padding:10px;
    border-top:1px solid rgba(213,245,255,.10);
    display:flex;
    gap:10px;
    background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
    align-items:flex-end;
  }

  .composerMain{ flex:1; min-width:0; display:flex; flex-direction:column; gap:7px; }

  .typingBar{
    min-height:18px;
    font-size:12px;
    color:rgba(230,247,255,.72);
    padding:0 6px 0 4px;
    display:flex;
    align-items:center;
    gap:8px;
    opacity:0;
    transform:translateY(3px);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }

  .typingBar.show{ opacity:1; transform:translateY(0); }

  .typingDots{ display:inline-flex; gap:4px; align-items:center; }
  .typingDots span{
    width:6px; height:6px; border-radius:50%; background:rgba(206,243,255,.82);
    animation:bounce 1.1s infinite ease-in-out;
  }
  .typingDots span:nth-child(2){ animation-delay:.15s; }
  .typingDots span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{
    0%,80%,100%{ transform:translateY(0); opacity:.45; }
    40%{ transform:translateY(-3px); opacity:1; }
  }

  textarea,
  .searchRow input,
  .inlineEdit input,
  .modal input{
    color:var(--text);
    outline:none;
    border-radius:14px;
    border:1px solid rgba(214,245,255,.12);
    background:linear-gradient(180deg, rgba(6,37,61,.34), rgba(3,29,50,.28));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter:blur(7px);
    -webkit-backdrop-filter:blur(7px);
    transition:border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }

  textarea{
    flex:1;
    resize:none;
    min-height:48px;
    max-height:140px;
    padding:12px 14px;
  }

  textarea::placeholder,
  .searchRow input::placeholder,
  .inlineEdit input::placeholder,
  .modal input::placeholder{ color:rgba(221,245,255,.52); }

  textarea:focus,
  .searchRow input:focus,
  .inlineEdit input:focus,
  .modal input:focus{
    border-color:rgba(114,198,255,.46);
    box-shadow:0 0 0 3px rgba(98,178,255,.10), inset 0 1px 0 rgba(255,255,255,.06);
    background:linear-gradient(180deg, rgba(8,42,69,.42), rgba(5,34,57,.36));
  }

  .modalWrap{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:14px;
    z-index:50;
    background:rgba(5,20,34,.16);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .modalWrap.show{ display:flex; }

  .modal,
  .overlayCard{
    width:100%;
    max-width:460px;
    background:linear-gradient(180deg, rgba(24,78,118,.78), rgba(14,56,90,.74));
    border:1px solid rgba(214,245,255,.14);
    border-radius:22px;
    padding:18px;
    box-shadow:0 24px 54px rgba(5,27,43,.25);
    backdrop-filter:blur(20px) saturate(130%);
    -webkit-backdrop-filter:blur(20px) saturate(130%);
  }

  .modal input{ width:100%; margin-top:10px; padding:12px 14px; }

  .err{
    display:none;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    background:rgba(255,107,99,.12);
    border:1px solid rgba(255,107,99,.24);
    color:#fff;
    font-size:13px;
  }

  .overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(4,24,40,.38);
    z-index:10;
    padding:14px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .overlay.show{ display:flex; }

  .overlayCard h3{ margin:0 0 8px 0; font-size:18px; }
  .overlayCard p{ margin:0 0 14px 0; color:rgba(229,231,235,.86); line-height:1.35; }

  #adminPanel{
    height:min(72vh,720px);
    display:flex;
    flex-direction:column;
    position:sticky;
    top:14px;
    background:linear-gradient(180deg, rgba(35,101,141,.42), rgba(18,70,108,.34));
  }

  @media (max-width:980px){ #adminPanel{ position:relative; top:auto; } }
  #adminPanel .hdr{ flex-shrink:0; }

  .adminBody{ display:flex; flex-direction:column; gap:12px; padding:14px; flex:1; overflow:hidden; }
  .searchRow{ display:flex; gap:8px; }
  .searchRow input{ flex:1; padding:11px 12px; min-width:0; }

  #usersList{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-right:4px;
    margin-top:10px;
  }

  .userCard{
    background:linear-gradient(180deg, rgba(228,248,255,.08), rgba(217,243,255,.05));
    border:1px solid rgba(214,245,255,.10);
    border-radius:18px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    content-visibility:auto;
    contain-intrinsic-size:130px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }

  .userCard .uName{ font-weight:900; color:#d9f6ff; }
  .userCard .uMeta{ font-size:12px; color:var(--muted); }

  .inlineEdit{ display:flex; gap:10px; margin-top:10px; align-items:stretch; flex-wrap:wrap; }
  .inlineEdit input{ flex:1 1 240px; min-width:180px; width:100%; padding:12px 14px; min-width:0; }

  .uActions{
    display:grid;
    grid-template-columns:repeat(2, minmax(124px, 1fr));
    gap:8px;
    align-content:flex-start;
    min-width:272px;
  }
  .uActions .btn{ width:100%; white-space:nowrap; }

  @media (max-width:560px){
    .userCard{ flex-direction:column; }
    .uActions{ grid-template-columns:1fr; min-width:0; }
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    background:linear-gradient(180deg, rgba(9,43,70,.76), rgba(6,34,56,.72));
    border-radius:999px;
    padding:10px 14px;
    font-size:13px;
    display:none;
    border:1px solid rgba(214,245,255,.12);
    z-index:60;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    box-shadow:0 12px 26px rgba(5,27,43,.16);
  }
  .toast.show{ display:block; }

  @media (prefers-reduced-motion:reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>

<body>
  <div class="wrap centered">
    <!-- CHAT -->
    <div class="mainCol">
      <div class="card">
        <div class="hdr">
          <div>
            <div class="title">Ocean chat thingy</div>
            <div class="sub" id="status">Connecting…</div>
          </div>
          <div class="pillRow">
            <div class="pill" id="mePill">Not signed in</div>
            <div class="pill admin" id="adminPill" style="display:none;">Admin</div>
            <button class="btn ghost" id="signOutTop" style="display:none;">Sign out</button>
          </div>
        </div>

        <div class="body">
          <div id="messages" aria-live="polite"></div>

          <div class="composer">
            <div class="composerMain">
              <div class="typingBar" id="typingBar">
                <span class="typingDots" aria-hidden="true"><span></span><span></span><span></span></span>
                <span id="typingText">Drafting message…</span>
              </div>
              <textarea id="messageInput" placeholder="Type…" maxlength="2000"></textarea>
            </div>
            <button class="btn" id="sendBtn">Send</button>
          </div>

          <div class="overlay" id="blockedOverlay">
            <div class="overlayCard">
              <h3 id="blockedTitle">Blocked</h3>
              <p id="blockedText">You cannot use the chat right now.</p>
              <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button class="btn ghost" id="blockedSignOut">Sign out</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="sideCol">
      <div class="card" id="adminPanel" style="display:none;">
        <div class="hdr">
          <div>
            <div class="title">Admin</div>
            <div class="sub">Verify • Ban • Logout • Rename • Delete</div>
          </div>
          <button class="btn ghost small" id="refreshAdmin">Refresh</button>
        </div>

        <div class="adminBody">
          <div>
            <div class="sectionTitle">Search</div>
            <div class="searchRow">
              <input id="adminSearch" placeholder="Search name / uid…" />
              <button class="btn ghost small" id="clearSearch">Clear</button>
            </div>
          </div>

          <div style="display:flex; flex-direction:column; min-height:0; flex:1;">
            <div class="sectionTitle">Users</div>
            <div id="usersList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Name prompt (unique names) -->
  <div class="modalWrap" id="nameModal" aria-modal="true" role="dialog">
    <div class="modal">
      <h2 style="margin:0 0 6px 0;">Create account</h2>
      <p style="margin:0; color:rgba(229,231,235,.78); line-height:1.35;">
        Pick a <b>unique</b> name. New users start <b>Unverified</b> until an admin verifies you.
      </p>
      <input id="displayName" placeholder="e.g. Alex" maxlength="24" autocomplete="off" />
      <div style="display:flex; gap:10px; margin-top:12px;">
        <button class="btn" id="saveNameBtn" style="flex:1;">Enter</button>
        <button class="btn ghost" id="signOutBtn" type="button">Cancel</button>
      </div>
      <div class="err" id="nameErr"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      updateDoc,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      limit,
      limitToLast,
      deleteDoc,
      runTransaction,
      writeBatch,
      getDocs
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    // ---- Firebase config (yours)
    const firebaseConfig = {
      apiKey: "AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
      authDomain: "darkchatroom-4b547.firebaseapp.com",
      projectId: "darkchatroom-4b547",
      storageBucket: "darkchatroom-4b547.firebasestorage.app",
      messagingSenderId: "764781101022",
      appId: "1:764781101022:web:ac3d6ac8e76d4258fda74f",
      measurementId: "G-31LH8LEQ89"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    // ---- DOM
    const $ = (id) => document.getElementById(id);
    const wrapEl = document.querySelector(".wrap");
    const sideCol = document.querySelector(".sideCol");

    const statusEl = $("status");
    const mePill = $("mePill");
    const adminPill = $("adminPill");
    const signOutTop = $("signOutTop");

    const messagesEl = $("messages");
    const messageInput = $("messageInput");
    const sendBtn = $("sendBtn");
    const typingBar = $("typingBar");
    const typingText = $("typingText");

    const blockedOverlay = $("blockedOverlay");
    const blockedTitle = $("blockedTitle");
    const blockedText = $("blockedText");
    const blockedSignOut = $("blockedSignOut");

    const adminPanel = $("adminPanel");
    const refreshAdmin = $("refreshAdmin");
    const usersList = $("usersList");
    const adminSearch = $("adminSearch");
    const clearSearch = $("clearSearch");

    const nameModal = $("nameModal");
    const displayNameEl = $("displayName");
    const saveNameBtn = $("saveNameBtn");
    const signOutBtn = $("signOutBtn");
    const nameErr = $("nameErr");

    const toast = $("toast");

    // ---- Device ID (ban persistence)
    function getDeviceId() {
      const k = "mgc_device_id";
      let v = localStorage.getItem(k);
      if (!v) {
        v = (crypto?.randomUUID
          ? crypto.randomUUID()
          : ("dev_" + Math.random().toString(36).slice(2) + Date.now()));
        localStorage.setItem(k, v);
      }
      return v;
    }
    const deviceId = getDeviceId();

    // ---- Local device account cache (auto-login)
    // Stores the last known profile tied to (deviceId, uid).
    const ACCOUNT_KEY = "mgc_account";

    function loadSavedAccount() {
      try {
        const raw = localStorage.getItem(ACCOUNT_KEY);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || typeof obj !== "object") return null;
        return {
          uid: typeof obj.uid === "string" ? obj.uid : null,
          deviceId: typeof obj.deviceId === "string" ? obj.deviceId : null,
          displayName: typeof obj.displayName === "string" ? obj.displayName : null,
          nameKey: typeof obj.nameKey === "string" ? obj.nameKey : null
        };
      } catch {
        return null;
      }
    }

    function saveAccountToDevice(profile) {
      if (!me?.uid || !profile) return;
      const displayName = typeof profile.displayName === "string" ? profile.displayName : "";
      const nameKey = typeof profile.nameKey === "string" ? profile.nameKey : "";
      try {
        localStorage.setItem(ACCOUNT_KEY, JSON.stringify({
          uid: me.uid,
          deviceId,
          displayName,
          nameKey,
          savedAt: Date.now()
        }));
      } catch (e) {
        console.warn("Could not save account to device", e);
      }
    }

    async function tryAutoRestoreProfile(currentUid) {
      const saved = loadSavedAccount();
      if (!saved) return false;

      // Auto-login if EITHER uid matches OR deviceId matches.
      const matches = (saved.uid && saved.uid === currentUid) || (saved.deviceId && saved.deviceId === deviceId);
      if (!matches) return false;

      if (!saved.displayName || !saved.nameKey) return false;

      const uref = doc(db, "users", currentUid);
      const nref = doc(db, "usernames", saved.nameKey);

      try {
        await runTransaction(db, async (tx) => {
          const uSnap = await tx.get(uref);
          if (uSnap.exists()) return;

          const nSnap = await tx.get(nref);
          if (nSnap.exists() && nSnap.data()?.uid !== currentUid) {
            throw new Error("NAME_TAKEN");
          }

          if (!nSnap.exists()) {
            tx.set(nref, {
              uid: currentUid,
              displayName: saved.displayName,
              createdAt: serverTimestamp()
            });
          }

          // Create a minimal profile consistent with rules.
          tx.set(uref, {
            uid: currentUid,
            displayName: saved.displayName,
            nameKey: saved.nameKey,
            deviceId: deviceId,
            verified: false,
            banned: false,
            loggedOut: false,
            isAdmin: false,
            createdAt: serverTimestamp()
          }, { merge: true });
        });

        return true;
      } catch (e) {
        console.warn("Auto-restore failed", e);
        return false;
      }
    }

    // ---- State
    let me = null;
    let myProfile = null;
    let unsubProfile = null;
    let unsubMessages = null;
    let unsubUsers = null;

    const userCache = new Map();
    let lastMessagesSnapshot = null;
    let liveUsers = [];

    // ✅ NEW: ensures we scroll to bottom on first load
    let didInitialScroll = false;
    let lastMessageRenderKey = "";
    let usersRenderQueued = false;
    let adminSearchTimer = null;

    let typingTimer = null;

    function setTypingState(show, text = "Drafting message…") {
      if (!typingBar) return;
      typingText.textContent = text;
      typingBar.classList.toggle("show", !!show);
    }

    function pulseTypingState() {
      const hasText = !!messageInput.value.trim();
      if (!hasText) {
        setTypingState(false);
        return;
      }
      setTypingState(true, messageInput.value.trim().length > 48 ? "Almost ready to send…" : "Drafting message…");
      if (typingTimer) clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        if (!messageInput.value.trim()) setTypingState(false);
      }, 1400);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function setErr(text) {
      if (!text) {
        nameErr.style.display = "none";
        nameErr.textContent = "";
        return;
      }
      nameErr.style.display = "block";
      nameErr.textContent = text;
    }

    function openNameModal() {
      setErr("");
      displayNameEl.value = "";
      nameModal.classList.add("show");
      setTimeout(() => displayNameEl.focus(), 30);
    }

    function closeNameModal() {
      nameModal.classList.remove("show");
    }

    function fmtTime(ts) {
      if (!ts?.toDate) return "";
      return ts.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHTML(s) {
      return String(s || "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[c]));
    }

    function normalizeName(raw) {
      const display = String(raw || "").trim().replace(/\s+/g, " ");
      const key = display.toLowerCase();
      return { display, key };
    }

    function canDeleteUser(uid) {
      return myProfile?.isAdmin === true && !!uid && uid !== me?.uid;
    }

    async function deleteUserEverywhere(uid) {
      if (!canDeleteUser(uid)) throw new Error("CANNOT_DELETE_USER");

      const uref = doc(db, "users", uid);
      const userSnap = await getDoc(uref);
      if (!userSnap.exists()) throw new Error("NO_USER");

      const userData = userSnap.data() || {};
      const nameKey = userData.nameKey || null;
      const targetDeviceId = userData.deviceId || null;

      const msgSnap = await getDocs(query(collection(db, "messages"), orderBy("createdAt"), limit(200)));
      const relatedMessages = [];
      msgSnap.forEach((d) => {
        const msg = d.data();
        if (msg.uid === uid) relatedMessages.push(d.id);
      });

      let batch = writeBatch(db);
      let ops = 0;
      const commitBatch = async () => {
        if (ops > 0) {
          await batch.commit();
          batch = writeBatch(db);
          ops = 0;
        }
      };

      if (nameKey) {
        batch.delete(doc(db, "usernames", nameKey));
        ops++;
      }

      if (targetDeviceId) {
        batch.delete(doc(db, "bannedDevices", targetDeviceId));
        ops++;
      }

      for (const mid of relatedMessages) {
        batch.delete(doc(db, "messages", mid));
        ops++;
        if (ops >= 450) await commitBatch();
      }

      batch.delete(uref);
      ops++;
      await commitBatch();
    }

    // ✅ NEW: force scroll to bottom (used on initial load)
    function scrollToBottomNow() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // existing near-bottom auto-scroll (used for live updates)
    function autoScrollNearBottom() {
      const nearBottom = (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) < 140;
      if (nearBottom) requestAnimationFrame(() => messagesEl.scrollTop = messagesEl.scrollHeight);
    }

    function buildMessageRenderKey(qs) {
      const parts = [];
      qs.forEach((d) => {
        const m = d.data();
        const u = userCache.get(m.uid) || {};
        parts.push([
          d.id,
          m.uid || "",
          u.displayName || "",
          u.verified ? "1" : "0",
          m.text || "",
          m.createdAt?.seconds || "",
          m.createdAt?.nanoseconds || ""
        ].join("|"));
      });
      return parts.join("~");
    }

    function queueAdminUsersRender() {
      if (!myProfile?.isAdmin || adminPanel.style.display === "none") return;
      if (usersRenderQueued) return;
      usersRenderQueued = true;
      requestAnimationFrame(() => {
        usersRenderQueued = false;
        renderAdminUsers();
      });
    }

    function cleanupSubs() {
      if (unsubProfile) { unsubProfile(); unsubProfile = null; }
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      if (unsubUsers) { unsubUsers(); unsubUsers = null; }
      userCache.clear();
      lastMessagesSnapshot = null;
      liveUsers = [];
      didInitialScroll = false; // ✅ reset on auth/session changes
      lastMessageRenderKey = "";
      usersRenderQueued = false;
      if (adminSearchTimer) {
        clearTimeout(adminSearchTimer);
        adminSearchTimer = null;
      }
      if (typingTimer) {
        clearTimeout(typingTimer);
        typingTimer = null;
      }
      setTypingState(false);
    }

    function setBlocked(mode) {
      if (!mode) {
        blockedOverlay.classList.remove("show");
        sendBtn.disabled = false;
        messageInput.disabled = false;
        return;
      }
      blockedTitle.textContent = mode.title;
      blockedText.textContent = mode.text;
      blockedOverlay.classList.add("show");
      sendBtn.disabled = true;
      messageInput.disabled = true;
    }

    function renderMessagesFromSnapshot(qs, { forceBottom = false } = {}) {
      const renderKey = buildMessageRenderKey(qs);
      let count = 0;
      qs.forEach(() => { count++; });

      if (renderKey === lastMessageRenderKey) {
        statusEl.textContent = `Live • ${count} loaded`;
        if (forceBottom) {
          requestAnimationFrame(() => {
            scrollToBottomNow();
            requestAnimationFrame(scrollToBottomNow);
          });
        }
        return;
      }

      lastMessageRenderKey = renderKey;
      messagesEl.innerHTML = "";
      const frag = document.createDocumentFragment();

      qs.forEach((d) => {
        const m = d.data();

        const time = fmtTime(m.createdAt);
        const u = userCache.get(m.uid) || {};
        const name = escapeHTML(u.displayName || "?");
        const verified = u.verified === true;

        const div = document.createElement("div");
        div.className = "msg";

        const vTag = verified
          ? `<span class="tag v">Verified</span>`
          : `<span class="tag unv">Unverified</span>`;

        const adminTools = (myProfile?.isAdmin === true)
          ? `<div class="adminMsgRow"><button class="btn danger small" data-delmsg="${d.id}">Delete</button></div>`
          : "";

        div.innerHTML = `
          <div class="meta">
            <div class="nameRow"><span class="name">${name}</span>${vTag}</div>
            <div>${time}</div>
          </div>
          <div class="text">${escapeHTML(m.text || "")}</div>
          ${adminTools}
        `;

        frag.appendChild(div);
      });

      messagesEl.appendChild(frag);
      statusEl.textContent = `Live • ${count} loaded`;

      if (forceBottom) {
        requestAnimationFrame(() => {
          scrollToBottomNow();
          requestAnimationFrame(scrollToBottomNow);
        });
      } else {
        autoScrollNearBottom();
      }
    }

    function renderAdminUsers() {
      if (!myProfile?.isAdmin) return;

      const users = Array.isArray(liveUsers) ? [...liveUsers] : [];
      const q = (adminSearch.value || "").trim().toLowerCase();

      const filtered = q
        ? users.filter(u =>
            String(u.displayName || "").toLowerCase().includes(q) ||
            String(u.uid || u.id || "").toLowerCase().includes(q)
          )
        : users;

      filtered.sort((a, b) => {
        const av = a.verified ? 1 : 0;
        const bv = b.verified ? 1 : 0;
        if (av !== bv) return av - bv;
        return String(a.displayName || "").localeCompare(String(b.displayName || ""));
      });

      usersList.innerHTML = "";

      for (const u of filtered) {
        const uid = u.uid || u.id;
        const isMe = (uid === me.uid);

        const flags = [
          u.isAdmin ? "Admin" : null,
          u.verified ? "Verified" : "Unverified",
          u.banned ? "Banned" : null,
          u.loggedOut ? "LoggedOut" : null
        ].filter(Boolean).join(" • ");

        const card = document.createElement("div");
        card.className = "userCard";

        card.innerHTML = `
          <div style="min-width:0; flex:1;">
            <div class="uName">${escapeHTML(u.displayName || "(no name)")}</div>
            <div class="uMeta">${escapeHTML(String(uid).slice(0, 10))} • ${escapeHTML(flags)}</div>
            <div class="inlineEdit">
              <input data-rename="${uid}" placeholder="New name" maxlength="24" />
              <button class="btn ok small" data-renbtn="${uid}">Rename</button>
            </div>
          </div>

          <div class="uActions">
            <button class="btn ghost small" data-verify="${uid}" data-verifyval="${u.verified ? "0" : "1"}">
              ${u.verified ? "Unverify" : "Verify"}
            </button>

            <button class="btn ghost small" data-clearlogout="${uid}" ${u.loggedOut ? "" : "disabled"}>
              Clear logout
            </button>

            <button class="btn ghost small" data-logout="${uid}" ${isMe ? "disabled" : ""}>
              Force logout
            </button>

            <button class="btn ghost small"
              data-setadmin="${uid}"
              data-setadminval="${u.isAdmin ? "0" : "1"}"
              ${isMe ? "disabled" : ""}>
              ${u.isAdmin ? "Remove admin" : "Make admin"}
            </button>

            <button class="btn danger small" data-ban="${uid}" data-banval="${u.banned ? "0" : "1"}">
              ${u.banned ? "Unban" : "Ban"}
            </button>

            <button class="btn danger small" data-deleteuser="${uid}" ${canDeleteUser(uid) ? "" : "disabled"}>
              Delete user
            </button>
          </div>
        `;

        usersList.appendChild(card);
      }
    }

    refreshAdmin.addEventListener("click", () => queueAdminUsersRender());
    adminSearch.addEventListener("input", () => {
      if (adminSearchTimer) clearTimeout(adminSearchTimer);
      adminSearchTimer = setTimeout(() => queueAdminUsersRender(), 90);
    });
    clearSearch.addEventListener("click", () => {
      adminSearch.value = "";
      if (adminSearchTimer) clearTimeout(adminSearchTimer);
      queueAdminUsersRender();
    });

    onAuthStateChanged(auth, async (user) => {
      cleanupSubs();
      me = user || null;
      myProfile = null;

      // Default: hide sidebar + center until proven admin
      sideCol.style.display = "none";
      wrapEl.classList.add("centered");

      if (!user) {
        statusEl.textContent = "Signing in…";
        mePill.textContent = "Not signed in";
        adminPill.style.display = "none";
        adminPanel.style.display = "none";
        signOutTop.style.display = "none";
        setBlocked(null);
        await signInAnonymously(auth);
        return;
      }

      // device ban check
      try {
        const banSnap = await getDoc(doc(db, "bannedDevices", deviceId));
        if (banSnap.exists() && banSnap.data()?.banned === true) {
          statusEl.textContent = "Blocked";
          mePill.textContent = "Banned device";
          adminPill.style.display = "none";
          adminPanel.style.display = "none";
          signOutTop.style.display = "none";
          setBlocked({ title: "Banned", text: "This device is banned. You cannot rejoin." });
          return;
        }
      } catch (e) { console.error(e); }

      const uref = doc(db, "users", user.uid);
      const snap = await getDoc(uref);

      if (!snap.exists()) {
        // Attempt auto-restore from the device cache if uid OR deviceId matches.
        const restored = await tryAutoRestoreProfile(user.uid);
        if (restored) {
          const post = await getDoc(uref);
          if (post.exists()) {
            myProfile = post.data();
            mePill.textContent = "You: " + (myProfile.displayName || "?");
            saveAccountToDevice(myProfile);
            closeNameModal();
          } else {
            mePill.textContent = "Choose a name";
            openNameModal();
          }
        } else {
          mePill.textContent = "Choose a name";
          openNameModal();
        }
      } else {
        myProfile = snap.data();
        mePill.textContent = "You: " + (myProfile.displayName || "?");
        saveAccountToDevice(myProfile);
        closeNameModal();
      }

      unsubProfile = onSnapshot(uref, (s) => {
        if (!s.exists()) return;
        myProfile = s.data();

        // Keep local device cache fresh (uid + deviceId + name).
        saveAccountToDevice(myProfile);

        mePill.textContent = "You: " + (myProfile.displayName || "?");

        if (myProfile.isAdmin) {
          adminPill.style.display = "inline-block";
          adminPanel.style.display = "flex";
          signOutTop.style.display = "inline-block";
          sideCol.style.display = "block";
          wrapEl.classList.remove("centered");
        } else {
          adminPill.style.display = "none";
          adminPanel.style.display = "none";
          signOutTop.style.display = "none";
          sideCol.style.display = "none";
          wrapEl.classList.add("centered");
        }

        if (myProfile.banned) {
          setBlocked({ title: "Banned", text: "An admin has banned this account/device." });
          return;
        }

        if (myProfile.loggedOut) {
          setBlocked({ title: "Logged out", text: "An admin logged you out. Ask an admin to clear it." });
          return;
        }

        setBlocked(null);
      });

      unsubUsers = onSnapshot(collection(db, "users"), (qs) => {
        const prevUserSig = JSON.stringify(Array.from(userCache.entries()));
        userCache.clear();
        liveUsers = [];

        qs.forEach((d) => {
          const u = d.data();
          const uid = d.id;

          const row = {
            id: uid,
            uid: uid,
            displayName: u.displayName || "",
            verified: u.verified === true,
            banned: u.banned === true,
            loggedOut: u.loggedOut === true,
            isAdmin: u.isAdmin === true,
            deviceId: u.deviceId || null,
            nameKey: u.nameKey || ""
          };

          liveUsers.push(row);

          userCache.set(uid, {
            displayName: row.displayName,
            verified: row.verified,
            banned: row.banned,
            loggedOut: row.loggedOut,
            isAdmin: row.isAdmin,
            deviceId: row.deviceId
          });
        });

        const nextUserSig = JSON.stringify(Array.from(userCache.entries()));
        const usersChanged = prevUserSig !== nextUserSig;

        if (lastMessagesSnapshot && usersChanged) {
          renderMessagesFromSnapshot(lastMessagesSnapshot, { forceBottom: !didInitialScroll });
          didInitialScroll = true;
        }

        queueAdminUsersRender();
      });

      const mq = query(collection(db, "messages"), orderBy("createdAt"), limitToLast(200));
      unsubMessages = onSnapshot(mq, (qs) => {
        lastMessagesSnapshot = qs;

        // ✅ forceBottom ONLY for very first message load
        renderMessagesFromSnapshot(qs, { forceBottom: !didInitialScroll });
        didInitialScroll = true;
      });

      statusEl.textContent = "Live";
    });

    async function saveName() {
      if (!me) return;

      const { display, key } = normalizeName(displayNameEl.value);

      setErr("");
      if (!display) return setErr("Name required.");
      if (display.length < 2) return setErr("Name too short.");
      if (display.length > 24) return setErr("Name too long.");

      saveNameBtn.disabled = true;

      try {
        const uref = doc(db, "users", me.uid);
        const nref = doc(db, "usernames", key);

        await runTransaction(db, async (tx) => {
          const nSnap = await tx.get(nref);
          if (nSnap.exists()) throw new Error("NAME_TAKEN");

          const uSnap = await tx.get(uref);
          const existing = uSnap.exists() ? uSnap.data() : null;

          tx.set(nref, { uid: me.uid, displayName: display, createdAt: serverTimestamp() });

          tx.set(uref, {
            uid: me.uid,
            displayName: display,
            nameKey: key,
            deviceId: deviceId,
            verified: false,
            banned: false,
            loggedOut: false,
            isAdmin: false,
            createdAt: existing?.createdAt || serverTimestamp()
          }, { merge: true });
        });

        // Persist account mapping on device (uid + deviceId)
        saveAccountToDevice({ displayName: display, nameKey: key });

        closeNameModal();
        showToast("Created. Waiting for verify.");
      } catch (e) {
        console.error(e);
        if (String(e?.message || "").includes("NAME_TAKEN")) setErr("That name is already taken.");
        else setErr("Couldn’t create account. Check console.");
      } finally {
        saveNameBtn.disabled = false;
      }
    }

    saveNameBtn.addEventListener("click", saveName);
    displayNameEl.addEventListener("keydown", (e) => { if (e.key === "Enter") saveName(); });

    signOutBtn.addEventListener("click", () => closeNameModal());

    blockedSignOut.addEventListener("click", async () => {
      try { await signOut(auth); } catch (e) { console.error(e); }
    });

    signOutTop.addEventListener("click", async () => {
      if (myProfile?.isAdmin) await signOut(auth);
    });

    async function send() {
      if (!me) return;
      if (!myProfile?.displayName) return openNameModal();
      if (myProfile.banned || myProfile.loggedOut) return;

      const text = messageInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      try {
        await addDoc(collection(db, "messages"), {
          uid: me.uid,
          text,
          createdAt: serverTimestamp()
        });
        messageInput.value = "";
        setTypingState(false);
      } catch (e) {
        console.error(e);
        showToast("Send failed (rules?)");
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    messageInput.addEventListener("input", pulseTypingState);
    messageInput.addEventListener("focus", pulseTypingState);
    messageInput.addEventListener("blur", () => {
      if (!messageInput.value.trim()) setTypingState(false);
    });

    document.addEventListener("click", async (e) => {
      const t = e.target;
      if (!(t instanceof HTMLElement)) return;

      const delId = t.getAttribute("data-delmsg");
      if (delId && myProfile?.isAdmin) {
        try {
          await deleteDoc(doc(db, "messages", delId));
          showToast("Message deleted");
        } catch (err) {
          console.error(err);
          showToast("Delete failed");
        }
        return;
      }

      if (!myProfile?.isAdmin) return;

      const vUid = t.getAttribute("data-verify");
      if (vUid) {
        const val = t.getAttribute("data-verifyval") === "1";
        try {
          await updateDoc(doc(db, "users", vUid), { verified: val });
          showToast(val ? "Verified" : "Unverified");
        } catch (err) {
          console.error(err);
          showToast("Verify failed");
        }
        return;
      }

      const clrUid = t.getAttribute("data-clearlogout");
      if (clrUid) {
        try {
          await updateDoc(doc(db, "users", clrUid), { loggedOut: false });
          showToast("Logout cleared");
        } catch (err) {
          console.error(err);
          showToast("Clear logout failed");
        }
        return;
      }

      const logoutUid = t.getAttribute("data-logout");
      if (logoutUid) {
        try {
          await updateDoc(doc(db, "users", logoutUid), { loggedOut: true });
          showToast("Forced logout");
        } catch (err) {
          console.error(err);
          showToast("Force logout failed");
        }
        return;
      }

      const adminUid = t.getAttribute("data-setadmin");
      if (adminUid) {
        const makeAdmin = t.getAttribute("data-setadminval") === "1";
        try {
          await updateDoc(doc(db, "users", adminUid), { isAdmin: makeAdmin });
          showToast(makeAdmin ? "Admin granted" : "Admin removed");
        } catch (err) {
          console.error(err);
          showToast("Admin change failed");
        }
        return;
      }

      const banUid = t.getAttribute("data-ban");
      if (banUid) {
        const willBan = t.getAttribute("data-banval") === "1";
        try {
          const targetSnap = await getDoc(doc(db, "users", banUid));
          const target = targetSnap.exists() ? targetSnap.data() : null;
          const tDevice = target?.deviceId;

          await updateDoc(doc(db, "users", banUid), {
            banned: willBan,
            loggedOut: willBan ? true : false
          });

          if (tDevice) {
            const dref = doc(db, "bannedDevices", tDevice);
            if (willBan) {
              await setDoc(dref, { banned: true, uid: banUid, bannedAt: serverTimestamp() }, { merge: true });
            } else {
              await deleteDoc(dref);
            }
          }

          showToast(willBan ? "User banned" : "User unbanned");
        } catch (err) {
          console.error(err);
          showToast("Ban/unban failed");
        }
        return;
      }

      const deleteUserUid = t.getAttribute("data-deleteuser");
      if (deleteUserUid) {
        if (!canDeleteUser(deleteUserUid)) {
          showToast("You can’t delete this user");
          return;
        }

        const target = liveUsers.find((u) => (u.uid || u.id) === deleteUserUid);
        const label = target?.displayName || "this user";
        const ok = window.confirm(`Delete ${label} from users, usernames, messages, and device bans? This cannot be undone.`);
        if (!ok) return;

        try {
          await deleteUserEverywhere(deleteUserUid);
          showToast("User deleted");
        } catch (err) {
          console.error(err);
          showToast("Delete user failed");
        }
        return;
      }

      const renUid = t.getAttribute("data-renbtn");
      if (renUid) {
        const input = document.querySelector(`input[data-rename="${CSS.escape(renUid)}"]`);
        const { display, key } = normalizeName(input?.value || "");
        if (!display) { showToast("Enter a name"); return; }
        if (display.length < 2 || display.length > 24) { showToast("Name must be 2–24"); return; }

        const uref = doc(db, "users", renUid);
        const newNameRef = doc(db, "usernames", key);

        try {
          await runTransaction(db, async (tx) => {
            const uSnap = await tx.get(uref);
            if (!uSnap.exists()) throw new Error("NO_USER");
            const u = uSnap.data();
            const oldKey = u.nameKey;

            if (oldKey !== key) {
              const taken = await tx.get(newNameRef);
              if (taken.exists()) throw new Error("NAME_TAKEN");

              tx.set(newNameRef, { uid: renUid, displayName: display, createdAt: serverTimestamp() });
              if (oldKey) tx.delete(doc(db, "usernames", oldKey));
            }

            tx.set(uref, { displayName: display, nameKey: key }, { merge: true });
          });

          showToast("Username changed");
        } catch (err) {
          console.error(err);
          if (String(err?.message || "").includes("NAME_TAKEN")) showToast("Name taken");
          else showToast("Rename failed");
        }
        return;
      }
    });

    const adminObserver = new MutationObserver(() => {
      if (adminPanel.style.display !== "none" && myProfile?.isAdmin) queueAdminUsersRender();
    });
    adminObserver.observe(adminPanel, { attributes: true, attributeFilter: ["style"] });
  </script>
</body>
</html>
