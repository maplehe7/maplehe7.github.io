<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{margin:0;font-family:Segoe UI;background:transparent;display:flex;justify-content:center}
.container{width:100%;max-width:850px;margin:20px;display:flex;gap:15px}
.card{background:#1e293b;border-radius:10px;padding:14px;color:white}
input,textarea{width:100%;padding:8px;margin:6px 0;border:none;border-radius:6px;background:#0f172a;color:white;font-size:14px}
textarea{height:50px;resize:none}
button{padding:4px 8px;border:none;border-radius:5px;font-size:11px;margin-top:4px;cursor:pointer}
.primary{background:#06b6d4;color:black}
.danger{background:#ef4444;color:white}
.adminBtn{background:#f59e0b}
#messages{height:380px;overflow-y:auto;margin:10px 0}
.message{background:#334155;padding:6px;border-radius:6px;margin-bottom:5px;font-size:13px}
.meta{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px}
.loggedout{font-size:11px;opacity:.7}
.sectionTitle{font-size:13px;margin-top:10px;margin-bottom:4px;font-weight:bold}
</style>
</head>
<body>

<div id="login" class="card" style="max-width:400px;margin:auto;">
<h3>Create Account</h3>
<input id="firstName" placeholder="First name (required)">
<input id="lastName" placeholder="Last name (optional)">
<button class="primary" onclick="createAccount()">Create</button>
</div>

<div id="chatUI" style="display:none;width:100%;">
<div class="container">

<div class="card" style="flex:2;">
<div id="profile"></div>
<div id="messages"></div>
<textarea id="messageInput" placeholder="Type message..."></textarea>
<button class="primary" onclick="sendMessage()">Send</button>
</div>

<div id="adminPanel" class="card" style="flex:1;display:none;">
<div class="sectionTitle">Logged In</div>
<div id="loggedInUsers"></div>
<div class="sectionTitle">Logged Out</div>
<div id="loggedOutUsers"></div>
</div>

</div>
</div>

<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
  authDomain: "darkchatroom-4b547.firebaseapp.com",
  projectId: "darkchatroom-4b547",
  storageBucket: "darkchatroom-4b547.firebasestorage.app",
  messagingSenderId: "764781101022",
  appId: "1:764781101022:web:ac3d6ac8e76d4258fda74f"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getFirestore();
let currentUserData=null;

/* LOGIN RETENTION */
onAuthStateChanged(auth,async(user)=>{
  if(!user){
    login.style.display="block";
    chatUI.style.display="none";
    return;
  }

  const snap=await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  currentUserData=snap.data();

  if(currentUserData.banned){
    alert("You are banned.");
    signOut(auth);
    return;
  }

  login.style.display="none";
  chatUI.style.display="block";
  startApp(user);
});

/* CREATE ACCOUNT */
window.createAccount=async function(){
  const first=firstName.value.trim();
  const last=lastName.value.trim();
  if(!first) return alert("First name required");

  const fullName=(first+" "+last).trim().toLowerCase();

  const existing=await getDocs(collection(db,"users"));
  let taken=false;
  existing.forEach(docSnap=>{
    const u=docSnap.data();
    const name=(u.firstName+" "+(u.lastName||"")).trim().toLowerCase();
    if(name===fullName) taken=true;
  });
  if(taken) return alert("Name already taken");

  const res=await signInAnonymously(auth);
  const uid=res.user.uid;
  localStorage.setItem("uid",uid);

  await setDoc(doc(db,"users",uid),{
    uid,firstName:first,lastName:last,
    verified:false,isAdmin:false,
    banned:false,loggedOut:false,
    createdAt:serverTimestamp()
  });
};

/* START APP */
function startApp(user){

updateProfile();

onSnapshot(doc(db,"users",user.uid),(snap)=>{
  currentUserData=snap.data();
  updateProfile();

  if(currentUserData.loggedOut){
    signOut(auth);
  }
});

/* MESSAGES */
const q=query(collection(db,"messages"),orderBy("createdAt"));
onSnapshot(q,(snap)=>{
  messages.innerHTML="";
  snap.forEach(docSnap=>{
    const d=docSnap.data();
    const time=d.createdAt?.toDate?
      new Date(d.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
      :"";
    messages.innerHTML+=`
    <div class="message">
      <div class="meta">
        <div>
          <strong>${d.firstName}</strong>
          ${d.verified?"✓":""}
        </div>
        <div>${time}</div>
      </div>
      ${d.text}
      ${currentUserData.isAdmin?`<br>
        <button class="danger" onclick="deleteMessage('${docSnap.id}')">Delete</button>`:""}
    </div>`;
  });
});

/* ADMIN PANEL */
if(currentUserData.isAdmin){
  adminPanel.style.display="block";

  onSnapshot(collection(db,"users"),(snap)=>{
    loggedInUsers.innerHTML="";
    loggedOutUsers.innerHTML="";
    snap.forEach(docSnap=>{
      const u=docSnap.data();
      const html=`
      <div style="margin-bottom:4px;font-size:12px">
        ${u.firstName} ${u.lastName||""}
        ${u.banned?"(Banned)":""}
        <br>
        <button class="adminBtn"
        onclick="verifyUser('${u.uid}',${!u.verified})">
        ${u.verified?"Unverify":"Verify"}
        </button>
        <button class="danger"
        onclick="banUser('${u.uid}',${!u.banned})">
        ${u.banned?"Unban":"Ban"}
        </button>
        <button class="danger"
        onclick="forceLogout('${u.uid}')">
        Force Logout
        </button>
      </div>`;

      if(u.loggedOut)
        loggedOutUsers.innerHTML+=
          `<div class="loggedout">${u.firstName}</div>`;
      else
        loggedInUsers.innerHTML+=html;
    });
  });
}
}

/* PROFILE */
function updateProfile(){
profile.innerHTML=
`<strong>${currentUserData.firstName}</strong>
<br>Status: ${currentUserData.verified?"Verified":"Unverified"}`;
}

/* SEND MESSAGE */
window.sendMessage=async function(){
const text=messageInput.value.trim();
if(!text) return;

await addDoc(collection(db,"messages"),{
  uid:currentUserData.uid,
  firstName:currentUserData.firstName,
  lastName:currentUserData.lastName,
  verified:currentUserData.verified,
  text,
  createdAt:serverTimestamp()
});
messageInput.value="";
};

/* ADMIN ACTIONS */
window.deleteMessage=id=>deleteDoc(doc(db,"messages",id));
window.verifyUser=(uid,val)=>updateDoc(doc(db,"users",uid),{verified:val});
window.forceLogout=uid=>updateDoc(doc(db,"users",uid),{loggedOut:true});
window.banUser=async(uid,val)=>{
  await updateDoc(doc(db,"users",uid),{banned:val});
  if(val) await updateDoc(doc(db,"users",uid),{loggedOut:true});
};

</script>
</body>
</html>
