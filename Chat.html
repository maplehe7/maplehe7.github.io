<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:transparent;
  display:flex;
  justify-content:center;
  color:white;
}

.container{
  width:100%;
  max-width:900px;
  margin:25px;
  display:flex;
  gap:18px;
}

.card{
  background:rgba(30,41,59,0.9);
  backdrop-filter:blur(8px);
  border-radius:14px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

input,textarea{
  width:100%;
  padding:8px 10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  font-size:14px;
}

textarea{
  height:55px;
  resize:none;
}

button{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  margin-top:4px;
}

.primary{background:#38bdf8;color:#0f172a}
.danger{background:#ef4444;color:white}
.adminBtn{background:#facc15;color:black}

#messages{
  height:420px;
  overflow-y:auto;
  margin:10px 0;
}

.message{
  background:#1e293b;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:6px;
  font-size:14px;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin-bottom:4px;
}

.verified{color:#22c55e;margin-left:4px}
.unverified{color:#94a3b8;margin-left:4px}
.sectionTitle{font-size:13px;font-weight:600;margin-top:12px;margin-bottom:5px}
.loggedout{font-size:11px;opacity:.7}
</style>
</head>
<body>

<div id="login" class="card" style="max-width:400px;margin:auto;">
<h3>Create Account</h3>
<input id="firstName" placeholder="First name (required)">
<input id="lastName" placeholder="Last name (optional)">
<button class="primary" onclick="createAccount()">Create</button>
</div>

<div id="chatUI" style="display:none;width:100%;">
<div class="container">

<div class="card" style="flex:2;">
<div id="profile"></div>
<div id="messages"></div>
<textarea id="messageInput" placeholder="Type message..."></textarea>
<button class="primary" onclick="sendMessage()">Send</button>
</div>

<div id="adminPanel" class="card" style="flex:1;display:none;">
<div class="sectionTitle">Logged In</div>
<div id="loggedInUsers"></div>
<div class="sectionTitle">Logged Out</div>
<div id="loggedOutUsers"></div>
</div>

</div>
</div>
<script>import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInAnonymously } 
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
  authDomain: "darkchatroom-4b547.firebaseapp.com",
  projectId: "darkchatroom-4b547",
  storageBucket: "darkchatroom-4b547.firebasestorage.app",
  messagingSenderId: "764781101022",
  appId: "1:764781101022:web:ac3d6ac8e76d4258fda74f",
  measurementId: "G-31LH8LEQ89"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.createAccount = async function(){
  try {
    const res = await signInAnonymously(auth);
    alert("SUCCESS UID: " + res.user.uid);
  } catch (e) {
    console.error(e);
    alert("ERROR: " + e.message);
  }
};</script>
</body>
</html>
