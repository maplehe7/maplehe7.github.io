<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid Global Chat</title>

<style>

:root{
    --card:rgba(17,24,39,.72);
    --stroke:rgba(148,163,184,.18);
    --text:#e5e7eb;
    --muted:rgba(229,231,235,.65);
    --brand:#4a86e8;
    --danger:#ff3b30;
    --ok:#34c759;
    --shadow:0 18px 50px rgba(0,0,0,.45),0 6px 16px rgba(0,0,0,.34);
    --r:18px;
}

*{
    box-sizing:border-box;
}

html,body{
    height:100%;
    background:transparent;
    -webkit-text-size-adjust:100%;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:transparent;
    display:flex;
    justify-content:center;
    padding:14px;
}

/* layout */

.wrap{
    width:100%;
    max-width:1100px;
    display:grid;
    gap:12px;
}

@media(min-width:980px){
    .wrap{
        grid-template-columns:2fr 1fr;
    }
}

/* cards */

.card{
    background:var(--card);
    border:1px solid var(--stroke);
    border-radius:var(--r);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
    overflow:hidden;
}

/* header */

.hdr{
    padding:12px 14px;
    border-bottom:1px solid var(--stroke);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.hdr .title{
    font-weight:900;
}

.hdr .sub{
    font-size:12px;
    color:var(--muted);
}

/* pills */

.pill{
    font-size:12px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--stroke);
    background:rgba(148,163,184,.1);
}

.pill.admin{
    background:rgba(74,134,232,.12);
    color:white;
}

/* buttons */

button,.btn{
    border:none;
    border-radius:12px;
    padding:8px 12px;
    font-weight:700;
    cursor:pointer;
    background:var(--brand);
    color:white;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
}

.btn.ghost{
    background:rgba(148,163,184,.15);
}

.btn.danger{background:var(--danger)}
.btn.ok{background:var(--ok)}

.small{
    font-size:12px;
    padding:6px 10px;
}

/* chat body */

.body{
    height:min(72vh,720px);
    display:flex;
    flex-direction:column;
    min-height:0;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:12px;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
}

.msg{
    background:rgba(2,6,23,.55);
    border-radius:14px;
    padding:10px;
    margin:8px 0;
}

.meta{
    font-size:12px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
}

/* composer */

.composer{
    display:flex;
    gap:10px;
    padding:10px;
    border-top:1px solid var(--stroke);
}

textarea,input{
    font-size:16px;
}

textarea{
    flex:1;
    border-radius:12px;
    border:1px solid var(--stroke);
    background:rgba(2,6,23,.6);
    color:white;
    padding:10px;
    resize:none;
}

/* admin panel */

#adminPanel{
    height:min(72vh,720px);
    display:flex;
    flex-direction:column;
    min-height:0;
}

.adminBody{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:12px;
    gap:10px;
    overflow:hidden;
    min-height:0;
}

.searchRow{
    display:flex;
    gap:8px;
}

.searchRow input{
    flex:1;
    border-radius:10px;
    padding:8px;
    border:1px solid var(--stroke);
    background:rgba(2,6,23,.6);
    color:white;
}

/* user list */

.usersContainer{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
}

#usersList{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
}

/* user card */

.userCard{
    background:rgba(148,163,184,.08);
    border:1px solid var(--stroke);
    border-radius:14px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    gap:8px;
}

.uMeta{
    font-size:11px;
    color:var(--muted);
}

.inlineEdit{
    display:flex;
    gap:6px;
    margin-top:6px;
}

.inlineEdit input{
    border-radius:10px;
    border:1px solid var(--stroke);
    background:rgba(2,6,23,.6);
    color:white;
    padding:6px;
}

.uActions{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:flex-end;
}

/* toast */

.toast{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    padding:10px 16px;
    border-radius:999px;
    display:none;
}

.toast.show{
    display:block;
}

</style>
</head>


<body>

<div class="wrap">

    <!-- CHAT PANEL -->
    <div class="card">

        <div class="hdr">
            <div>
                <div class="title">Mid Global Chat</div>
                <div class="sub" id="status">Connecting...</div>
            </div>

            <div style="display:flex;gap:8px">
                <div class="pill" id="mePill">Not signed in</div>
                <div class="pill admin" id="adminPill" style="display:none">Admin</div>
            </div>
        </div>

        <div class="body">

            <div id="messages"></div>

            <div class="composer">
                <textarea id="messageInput"></textarea>
                <button class="btn" id="sendBtn">Send</button>
            </div>

        </div>
    </div>


    <!-- ADMIN PANEL -->
    <div class="card" id="adminPanel" style="display:none">

        <div class="hdr">
            <div>
                <div class="title">Admin</div>
                <div class="sub">Moderation</div>
            </div>

            <button class="btn ghost small" id="refreshAdmin">Refresh</button>
        </div>

        <div class="adminBody">

            <div class="searchRow">
                <input id="adminSearch" placeholder="Search user">
                <button class="btn ghost small" id="clearSearch">Clear</button>
            </div>

            <div class="usersContainer">
                <div id="usersList"></div>
            </div>

        </div>

    </div>

</div>


<div class="toast" id="toast"></div>

<!-- Firebase + JS remains exactly the same as previous working version -->

</body>
</html>
