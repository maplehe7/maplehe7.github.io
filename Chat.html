<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{
  margin:0;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"San Francisco",
              "Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex;
  justify-content:center;
  color:#111;
}

.container{
  width:100%;
  max-width:1100px;
  margin:40px 20px;
  display:flex;
  gap:28px;
}

.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:20px;
  padding:22px;
  box-shadow:
    0 8px 30px rgba(0,0,0,0.08),
    0 2px 6px rgba(0,0,0,0.05);
}

/* Login */
#login{
  width:280px;
  margin:auto;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

#login h3{
  font-weight:600;
  font-size:18px;
  margin-bottom:14px;
}

input,textarea{
  width:100%;
  padding:8px 10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.08);
  background:white;
  font-size:14px;
  outline:none;
  transition:.2s ease;
}

input:focus,textarea:focus{
  border:1px solid #4a86e8;
  box-shadow:0 0 0 3px rgba(74,134,232,0.15);
}

textarea{
  height:60px;
  resize:none;
}

button{
  border:none;
  border-radius:10px;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
  font-weight:500;
  transition:.2s ease;
}

.primary{background:#4a86e8;color:white;}
.primary:hover{background:#3d73c9;}
.danger{background:#ff3b30;color:white;}
.adminBtn{background:#34c759;color:white;}

#messages{
  height:460px;
  overflow-y:auto;
  margin:16px 0;
}

.message{
  background:white;
  padding:10px 14px;
  border-radius:14px;
  margin-bottom:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  font-size:14px;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.verified{color:#34c759;margin-left:4px;}
.unverified{color:#999;margin-left:4px;}

.sectionTitle{
  font-size:13px;
  font-weight:600;
  margin:16px 0 8px;
  color:#555;
}

.userCard{
  background:white;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  font-size:13px;
}

.loggedout{
  font-size:12px;
  color:#888;
  padding:6px 0;
}
</style>
</head>
<body>

<div id="login" class="card">
<h3>Create Account</h3>
<input id="firstName" placeholder="First name">
<input id="lastName" placeholder="Last name (optional)">
<button class="primary" onclick="createAccount()">Enter Chat</button>
</div>

<div id="chatUI" style="display:none;width:100%;">
<div class="container">

<div class="card" style="flex:2;">
<div id="profile"></div>
<div id="messages"></div>
<textarea id="messageInput" placeholder="Type message..."></textarea>
<button class="primary" onclick="sendMessage()">Send</button>
</div>

<div id="adminPanel" class="card" style="flex:1;display:none;">
<div class="sectionTitle">Logged In</div>
<div id="loggedInUsers"></div>
<div class="sectionTitle">Logged Out</div>
<div id="loggedOutUsers"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
  authDomain: "darkchatroom-4b547.firebaseapp.com",
  projectId: "darkchatroom-4b547",
  storageBucket: "darkchatroom-4b547.firebasestorage.app",
  messagingSenderId: "764781101022",
  appId: "1:764781101022:web:ac3d6ac8e76d4258fda74f",
  measurementId: "G-31LH8LEQ89"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getFirestore();
let currentUserData=null;

/* AUTH STATE */
onAuthStateChanged(auth,async(user)=>{
  if(!user){
    login.style.display="block";
    chatUI.style.display="none";
    return;
  }

  localStorage.setItem("uid",user.uid);

  const snap=await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  currentUserData=snap.data();

  if(currentUserData.banned){
    alert("You are banned.");
    signOut(auth);
    return;
  }

  login.style.display="none";
  chatUI.style.display="block";
  startApp(user);
});

/* CREATE ACCOUNT */
window.createAccount = async function(){

  const first = firstName.value.trim();
  const last = lastName.value.trim();

  if(!first){
    alert("First name required");
    return;
  }

  try{

    // 1️⃣ Sign in anonymously FIRST
    const res = await signInAnonymously(auth);
    const uid = res.user.uid;

    localStorage.setItem("uid", uid);

    // 2️⃣ Check duplicate name AFTER auth
    const fullName = (first + " " + last).trim().toLowerCase();
    const usersSnap = await getDocs(collection(db,"users"));

    let taken = false;
    usersSnap.forEach(docSnap=>{
      const u = docSnap.data();
      const existing = (u.firstName + " " + (u.lastName||""))
                        .trim().toLowerCase();
      if(existing === fullName) taken = true;
    });

    if(taken){
      alert("Name already taken");
      await res.user.delete();   // delete temp auth user
      return;
    }

    // 3️⃣ Create user doc
    await setDoc(doc(db,"users",uid),{
      uid: uid,
      firstName: first,
      lastName: last,
      verified: false,
      isAdmin: false,
      banned: false,
      loggedOut: false,
      createdAt: serverTimestamp()
    });

  }catch(err){
    console.error(err);
    alert("Signup failed. Check console.");
  }
};
/* START */
function startApp(user){

updateProfile();

onSnapshot(doc(db,"users",user.uid),(snap)=>{
  currentUserData=snap.data();
  updateProfile();
  if(currentUserData.loggedOut){
    signOut(auth);
  }
});

/* MESSAGES */
const q=query(collection(db,"messages"),orderBy("createdAt"));
onSnapshot(q,(snap)=>{
  messages.innerHTML="";
  snap.forEach(docSnap=>{
    const d=docSnap.data();
    const time=d.createdAt?.toDate?
      new Date(d.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
      :"";

    messages.innerHTML+=`
    <div class="message">
      <div class="meta">
        <div>
          <strong>${d.firstName}</strong>
          ${d.verified
            ?'<span class="verified">✓</span>'
            :'<span class="unverified">(Unverified)</span>'}
        </div>
        <div>${time}</div>
      </div>
      ${d.text}
      ${currentUserData.isAdmin?
      `<br><button class="danger" onclick="deleteMessage('${docSnap.id}')">Delete</button>`:""}
    </div>`;
  });
});

/* ADMIN */
if(currentUserData.isAdmin){
adminPanel.style.display="block";

onSnapshot(collection(db,"users"),(snap)=>{
loggedInUsers.innerHTML="";
loggedOutUsers.innerHTML="";
snap.forEach(d=>{
const u=d.data();

if(u.loggedOut){
loggedOutUsers.innerHTML+=`<div class="loggedout">${u.firstName}</div>`;
}else{
loggedInUsers.innerHTML+=`
<div class="userCard">
<strong>${u.firstName}</strong>
<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
<button class="adminBtn" onclick="verifyUser('${u.uid}',${!u.verified})">
${u.verified?"Unverify":"Verify"}
</button>
<button class="danger" onclick="banUser('${u.uid}',${!u.banned})">
${u.banned?"Unban":"Ban"}
</button>
<button class="danger" onclick="forceLogout('${u.uid}')">
Logout
</button>
</div>
</div>`;
}
});
});
}
}

function updateProfile(){
profile.innerHTML=
`<strong>${currentUserData.firstName}</strong>
<br>Status: ${currentUserData.verified?"Verified":"Unverified"}`;
}

window.sendMessage=async function(){
const text=messageInput.value.trim();
if(!text) return;

await addDoc(collection(db,"messages"),{
uid:currentUserData.uid,
firstName:currentUserData.firstName,
verified:currentUserData.verified,
text,
createdAt:serverTimestamp()
});
messageInput.value="";
};

window.deleteMessage=id=>deleteDoc(doc(db,"messages",id));
window.verifyUser=(uid,val)=>updateDoc(doc(db,"users",uid),{verified:val});
window.forceLogout=uid=>updateDoc(doc(db,"users",uid),{loggedOut:true});
window.banUser=async(uid,val)=>{
await updateDoc(doc(db,"users",uid),{banned:val});
if(val) await updateDoc(doc(db,"users",uid),{loggedOut:true});
};
</script>
</body>
</html>
