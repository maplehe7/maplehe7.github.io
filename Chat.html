<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean chat thingy</title>

<style>

:root{
--card:rgba(17,24,39,.72);
--stroke:rgba(148,163,184,.18);
--text:#e5e7eb;
--muted:rgba(229,231,235,.65);
--brand:#4a86e8;
--danger:#ff3b30;
--ok:#34c759;
--shadow:0 18px 50px rgba(0,0,0,.45),0 6px 16px rgba(0,0,0,.34);
--r:18px;
}

*{box-sizing:border-box}

html,body{
height:100%;
background:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--text);
background:transparent;
display:flex;
justify-content:center;
padding:14px;
}

.wrap{
width:100%;
max-width:1100px;
display:grid;
gap:12px;
}

@media(min-width:980px){
.wrap{
grid-template-columns:2fr 1fr;
}
}

.card{
background:var(--card);
border:1px solid var(--stroke);
border-radius:var(--r);
box-shadow:var(--shadow);
backdrop-filter:blur(18px);
overflow:hidden;
}

.hdr{
padding:12px 14px;
border-bottom:1px solid var(--stroke);
display:flex;
justify-content:space-between;
align-items:center;
}

.hdr .title{
font-weight:900;
}

.hdr .sub{
font-size:12px;
color:var(--muted);
}

.pill{
font-size:12px;
padding:6px 10px;
border-radius:999px;
border:1px solid var(--stroke);
background:rgba(148,163,184,.1);
}

.pill.admin{
background:rgba(74,134,232,.12);
color:white;
}

.btn{
border:none;
border-radius:12px;
padding:8px 12px;
font-weight:700;
cursor:pointer;
background:var(--brand);
color:white;
}

.btn.ghost{
background:rgba(148,163,184,.15);
}

.btn.danger{background:var(--danger)}
.btn.ok{background:var(--ok)}

.small{font-size:12px;padding:6px 10px}

.body{
height:min(72vh,720px);
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:12px;
}

.msg{
background:rgba(2,6,23,.55);
border-radius:14px;
padding:10px;
margin:8px 0;
}

.meta{
font-size:12px;
color:var(--muted);
display:flex;
justify-content:space-between;
margin-bottom:4px;
}

.composer{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid var(--stroke);
}

textarea{
flex:1;
border-radius:12px;
border:1px solid var(--stroke);
background:rgba(2,6,23,.6);
color:white;
padding:10px;
resize:none;
}

/* ADMIN PANEL */

#adminPanel{
height:min(72vh,720px);
display:flex;
flex-direction:column;
}

#adminPanel .hdr{
flex-shrink:0;
}

.adminBody{
flex:1;
display:flex;
flex-direction:column;
padding:12px;
gap:10px;
overflow:hidden;
min-height:0;
}

.searchRow{
display:flex;
gap:8px;
}

.searchRow input{
flex:1;
border-radius:10px;
padding:8px;
border:1px solid var(--stroke);
background:rgba(2,6,23,.6);
color:white;
}

/* USERS SCROLL */

.usersContainer{
flex:1;
display:flex;
flex-direction:column;
min-height:0;
}

#usersList{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.userCard{
background:rgba(148,163,184,.08);
border:1px solid var(--stroke);
border-radius:14px;
padding:10px;
display:flex;
justify-content:space-between;
gap:8px;
}

.uMeta{
font-size:11px;
color:var(--muted);
}

.inlineEdit{
display:flex;
gap:6px;
margin-top:6px;
}

.inlineEdit input{
border-radius:10px;
border:1px solid var(--stroke);
background:rgba(2,6,23,.6);
color:white;
padding:6px;
}

.uActions{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:flex-end;
}

.toast{
position:fixed;
bottom:14px;
left:50%;
transform:translateX(-50%);
background:black;
padding:10px 16px;
border-radius:999px;
display:none;
}

.toast.show{display:block}

</style>
</head>

<body>

<div class="wrap">

<!-- CHAT -->
<div class="card">

<div class="hdr">
<div>
<div class="title">Ocean chat thingy</div>
<div class="sub" id="status">Connecting...</div>
</div>

<div style="display:flex;gap:8px">
<div class="pill" id="mePill">Not signed in</div>
<div class="pill admin" id="adminPill" style="display:none">Admin</div>
</div>
</div>

<div class="body">

<div id="messages"></div>

<div class="composer">
<textarea id="messageInput"></textarea>
<button class="btn" id="sendBtn">Send</button>
</div>

</div>
</div>

<!-- ADMIN PANEL -->

<div class="card" id="adminPanel" style="display:none">

<div class="hdr">
<div>
<div class="title">Admin</div>
<div class="sub">Moderation</div>
</div>
<button class="btn ghost small" id="refreshAdmin">Refresh</button>
</div>

<div class="adminBody">

<div class="searchRow">
<input id="adminSearch" placeholder="Search user"/>
<button class="btn ghost small" id="clearSearch">Clear</button>
</div>

<div class="usersContainer">
<div id="usersList"></div>
</div>

</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import {
getFirestore, doc, setDoc, getDoc, updateDoc,
collection, addDoc, query, orderBy, onSnapshot,
serverTimestamp, limit, deleteDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
authDomain:"darkchatroom-4b547.firebaseapp.com",
projectId:"darkchatroom-4b547"
};

initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

const messagesEl=document.getElementById("messages");
const sendBtn=document.getElementById("sendBtn");
const input=document.getElementById("messageInput");

const adminPanel=document.getElementById("adminPanel");
const usersList=document.getElementById("usersList");

const toast=document.getElementById("toast");

let me=null;
let myProfile=null;

let userCache=new Map();
let liveUsers=[];

function showToast(t){
toast.textContent=t;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

function deviceId(){
let d=localStorage.getItem("deviceId");
if(!d){
d=Math.random().toString(36).slice(2)+Date.now();
localStorage.setItem("deviceId",d);
}
return d;
}

onAuthStateChanged(auth,async(user)=>{

if(!user){
await signInAnonymously(auth);
return;
}

me=user;

const banSnap=await getDoc(doc(db,"bannedDevices",deviceId()));
if(banSnap.exists()){
showToast("Device banned");
return;
}

});

onSnapshot(collection(db,"users"),snap=>{

userCache.clear();
liveUsers=[];

snap.forEach(d=>{

const u=d.data();

const row={
uid:d.id,
displayName:u.displayName||"",
verified:u.verified,
banned:u.banned,
loggedOut:u.loggedOut,
isAdmin:u.isAdmin,
deviceId:u.deviceId
};

liveUsers.push(row);

userCache.set(row.uid,row);

});

if(myProfile?.isAdmin){
renderAdmin();
}

});

function renderAdmin(){

usersList.innerHTML="";

liveUsers.forEach(u=>{

const card=document.createElement("div");
card.className="userCard";

card.innerHTML=`
<div>
<div>${u.displayName}</div>
<div class="uMeta">${u.uid.slice(0,8)}</div>

<div class="inlineEdit">
<input data-rename="${u.uid}">
<button class="btn ok small" data-renbtn="${u.uid}">Rename</button>
</div>

</div>

<div class="uActions">

<button class="btn ghost small" data-verify="${u.uid}" data-verifyval="${u.verified?0:1}">
${u.verified?"Unverify":"Verify"}
</button>

<button class="btn ghost small" data-setadmin="${u.uid}" data-setadminval="${u.isAdmin?0:1}">
${u.isAdmin?"Remove admin":"Make admin"}
</button>

<button class="btn ghost small" data-logout="${u.uid}">
Logout
</button>

<button class="btn danger small" data-ban="${u.uid}" data-banval="${u.banned?0:1}">
${u.banned?"Unban":"Ban"}
</button>

</div>
`;

usersList.appendChild(card);

});

}

document.addEventListener("click",async e=>{

const t=e.target;

if(!t.dataset)return;

/* rename */

if(t.dataset.renbtn){

const uid=t.dataset.renbtn;

const input=document.querySelector(`input[data-rename="${uid}"]`);
const name=input.value.trim();

if(!name)return;

await updateDoc(doc(db,"users",uid),{
displayName:name,
nameKey:name.toLowerCase()
});

showToast("Renamed");

}

/* verify */

if(t.dataset.verify){

const uid=t.dataset.verify;
const val=t.dataset.verifyval==="1";

await updateDoc(doc(db,"users",uid),{verified:val});

showToast("Updated");

}

/* admin */

if(t.dataset.setadmin){

const uid=t.dataset.setadmin;
const val=t.dataset.setadminval==="1";

await updateDoc(doc(db,"users",uid),{isAdmin:val});

showToast("Admin updated");

}

/* logout */

if(t.dataset.logout){

await updateDoc(doc(db,"users",t.dataset.logout),{
loggedOut:true
});

}

/* ban */

if(t.dataset.ban){

const uid=t.dataset.ban;
const willBan=t.dataset.banval==="1";

const snap=await getDoc(doc(db,"users",uid));
const device=snap.data()?.deviceId;

await updateDoc(doc(db,"users",uid),{
banned:willBan
});

if(device){

if(willBan){
await setDoc(doc(db,"bannedDevices",device),{
banned:true
});
}else{
await deleteDoc(doc(db,"bannedDevices",device));
}

}

showToast("Ban updated");

}

});

</script>

</body>
</html>
