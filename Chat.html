<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean chat thingy</title>

  <style>
    :root{
      --bg: transparent;
      --card: rgba(17,24,39,.72);
      --stroke: rgba(148,163,184,.18);
      --text: #e5e7eb;
      --muted: rgba(229,231,235,.65);
      --brand: #4a86e8;
      --danger: #ff3b30;
      --ok: #34c759;
      --shadow: 0 18px 50px rgba(0,0,0,.45), 0 6px 16px rgba(0,0,0,.34);
      --r: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; background:transparent; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:transparent;          /* ✅ transparent iframe background */
      display:flex;
      justify-content:center;
      padding:14px;
    }

    /* iframe friendly */
    .wrap{ width:100%; max-width:1100px; display:grid; gap:12px; }
    @media (min-width: 980px){
      .wrap{ grid-template-columns: 2fr 1fr; align-items:start; }
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow:hidden;                 /* ✅ prevents inner scroll content from escaping border */
      min-height:0;                    /* ✅ helps flex children scroll correctly */
    }

    .hdr{
      padding:12px 14px;
      border-bottom:1px solid var(--stroke);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }

    .hdr .title{ font-weight:900; letter-spacing:.2px; }
    .hdr .sub{ font-size:12px; color:var(--muted); margin-top:3px; }

    .pillRow{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(148,163,184,.10);
      color:var(--muted);
      user-select:none;
      white-space:nowrap;
    }
    .pill.admin{ border-color: rgba(74,134,232,.25); background:rgba(74,134,232,.12); color:rgba(229,231,235,.90) }

    .btn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background:var(--brand);
      color:white;
      transition:opacity .2s ease, transform .08s ease;
      user-select:none;
      font-size:13px;
      line-height:1;
    }
    .btn:active{ transform:translateY(1px); }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; }
    .btn.ghost{ background:rgba(148,163,184,.14); color:var(--text); }
    .btn.danger{ background:var(--danger); }
    .btn.ok{ background:var(--ok); }
    .small{ padding:8px 10px; border-radius:12px; font-size:12px; font-weight:900; }

    /* CHAT */
    .body{
      height:min(72vh, 720px);
      display:flex;
      flex-direction:column;
      position:relative;
      min-height:0; /* ✅ */
    }

    #messages{
      flex:1 1 auto;
      overflow:auto;
      padding:12px;
      scroll-behavior:smooth;
      min-height:0; /* ✅ */
    }

    .msg{
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(2,6,23,.55);
      margin:10px 0;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .nameRow{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .name{ color:var(--text); font-weight:900; }

    .tag{
      font-size:11px;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(148,163,184,.10);
      color:var(--muted);
    }
    .tag.unv{ border-color: rgba(255,59,48,.30); background:rgba(255,59,48,.10); color:#ffd2cf; }
    .tag.v{ border-color: rgba(52,199,89,.30); background:rgba(52,199,89,.10); color:#d7ffea; }

    .text{ white-space:pre-wrap; word-break:break-word; line-height:1.35; }

    .adminMsgRow{ margin-top:8px; display:flex; justify-content:flex-end; gap:8px; }

    .composer{
      padding:10px;
      border-top:1px solid var(--stroke);
      background:rgba(148,163,184,.06);
      display:flex;
      gap:10px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    textarea{
      flex:1;
      resize:none;
      min-height:44px;
      max-height:140px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.55);
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    textarea:focus{
      border-color: rgba(74,134,232,.75);
      box-shadow: 0 0 0 4px rgba(74,134,232,.18);
    }

    /* Modals */
    .modalWrap{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:18px; z-index:50; }
    .modalWrap.show{ display:flex; }

    .modal{
      width:100%; max-width:460px;
      background:rgba(17,24,39,.88);
      border:1px solid var(--stroke);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow:hidden;
    }
    .modal h2{ margin:0 0 8px; font-size:18px; }
    .modal p{ margin:0 0 12px; color:var(--muted); font-size:13px; line-height:1.45; }

    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.55);
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{
      border-color: rgba(74,134,232,.75);
      box-shadow: 0 0 0 4px rgba(74,134,232,.18);
    }

    .err{ display:none; margin-top:10px; font-size:12px; color:#ffb4ae; }

    /* Overlay status (ban/logout) */
    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(2,6,23,.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index:5;
    }
    .overlay.show{ display:flex; }

    .overlayCard{
      width:100%;
      max-width:520px;
      border-radius:18px;
      border:1px solid rgba(148,163,184,.20);
      background:rgba(17,24,39,.86);
      padding:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .overlayCard h3{ margin:0 0 8px; font-size:16px; }
    .overlayCard p{ margin:0 0 12px; font-size:13px; color:var(--muted); line-height:1.45; }

    /* ADMIN PANEL */
    #adminPanel{
      height:min(72vh, 720px);     /* ✅ same height as chat */
      display:flex;
      flex-direction:column;
      min-height:0;                 /* ✅ critical */
    }

    #adminPanel .hdr{ flex:0 0 auto; }

    .adminBody{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex:1 1 auto;
      overflow:hidden;              /* ✅ contains scroll inside children only */
      min-height:0;                 /* ✅ critical */
    }

    .sectionTitle{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .searchRow{ display:flex; gap:8px; align-items:center; }
    .searchRow input{ padding:10px 10px; border-radius:12px; }

    /* ✅ Make the USERS section wrapper fill remaining height */
    #adminPanel .adminBody > .usersSection{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      min-height:0;                 /* ✅ critical for #usersList scrolling */
    }

    /* ✅ only the list scrolls, and stays inside border */
    #usersList{
      flex:1 1 auto;
      min-height:0;                 /* ✅ critical */
      overflow-y:auto;
      overflow-x:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
      padding-right:4px;            /* keeps scrollbar off border */
    }

    .userCard{
      background:rgba(148,163,184,.08);
      border:1px solid var(--stroke);
      border-radius:16px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      overflow:hidden;              /* ✅ inner content won't bleed out */
    }

    .userCard .uName{ font-weight:900; }
    .userCard .uMeta{ font-size:12px; color:var(--muted); margin-top:4px; }

    .uActions{ display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }

    .inlineEdit{ display:flex; gap:8px; align-items:center; margin-top:10px; }
    .inlineEdit input{ padding:10px 10px; border-radius:12px; }

    .toast{
      position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
      background:rgba(2,6,23,.82); color:#fff;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px; padding:10px 14px; font-size:13px;
      box-shadow:var(--shadow);
      display:none; max-width:min(560px, calc(100% - 28px)); text-align:center;
      z-index:80;
      overflow:hidden;
    }
    .toast.show{ display:block; }
    /* --- ADMIN SCROLL: make only the list scroll (works in iframes/iOS) --- */
    #adminPanel{
      height:min(72vh, 720px);
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    
    #adminPanel .adminBody{
      flex:1 1 auto;
      min-height:0;
      overflow:hidden; /* contain scroll inside #usersList */
    }
    
    #adminPanel .usersSection{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    
    #usersList{
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling: touch; /* ✅ iOS */
      padding-right:6px;
    }
    
    /* --- FIX USER CARD OVERFLOW: responsive card layout --- */
    .userCard{
      display:flex;
      flex-direction:column;   /* ✅ stack content */
      gap:10px;
      overflow:hidden;         /* ✅ nothing can bleed outside */
    }
    
    /* left side can shrink properly */
    .userCard > div:first-child{
      min-width:0;
    }
    
    /* rename row wraps instead of pushing out */
    .inlineEdit{
      display:flex;
      flex-wrap:wrap;          /* ✅ allow wrap */
      gap:8px;
    }
    
    .inlineEdit input{
      flex:1 1 180px;          /* ✅ input shrinks */
      min-width:140px;
    }
    
    .inlineEdit .btn{
      flex:0 0 auto;
    }
    
    /* actions row wraps INSIDE the card */
    .uActions{
      display:flex;
      flex-wrap:wrap;          /* ✅ wrap buttons */
      gap:8px;
      justify-content:flex-start;
      width:100%;
    }
    
    .uActions .btn{
      flex:1 1 120px;          /* ✅ buttons become grid-ish */
      min-width:120px;
      max-width:100%;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- CHAT -->
    <div class="card">
      <div class="hdr">
        <div>
          <div class="title">Ocean chat thingy</div>
          <div class="sub" id="status">Connecting…</div>
        </div>
        <div class="pillRow">
          <div class="pill" id="mePill">Not signed in</div>
          <div class="pill admin" id="adminPill" style="display:none;">Admin</div>
          <!-- Users cannot sign out; admin-only sign out -->
          <button class="btn ghost" id="signOutTop" style="display:none;">Sign out</button>
        </div>
      </div>

      <div class="body">
        <div id="messages" aria-live="polite"></div>

        <div class="composer">
          <textarea id="messageInput" placeholder="Type…" maxlength="2000"></textarea>
          <button class="btn" id="sendBtn">Send</button>
        </div>

        <div class="overlay" id="blockedOverlay">
          <div class="overlayCard">
            <h3 id="blockedTitle">Blocked</h3>
            <p id="blockedText">You cannot use the chat right now.</p>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
              <button class="btn ghost" id="blockedSignOut">OK</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="card" id="adminPanel" style="display:none;">
      <div class="hdr">
        <div>
          <div class="title">Admin</div>
          <div class="sub">Verify • Ban • Logout • Rename • Admin • Delete</div>
        </div>
        <button class="btn ghost small" id="refreshAdmin">Refresh</button>
      </div>

      <div class="adminBody">
        <div class="searchSection">
          <div class="sectionTitle">Search</div>
          <div class="searchRow">
            <input id="adminSearch" placeholder="Search name / uid…" />
            <button class="btn ghost small" id="clearSearch">Clear</button>
          </div>
        </div>

        <!-- ✅ this wrapper is required for scrolling to work correctly -->
        <div class="usersSection">
          <div class="sectionTitle">Users</div>
          <div id="usersList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Name prompt -->
  <div class="modalWrap" id="nameModal" aria-modal="true" role="dialog">
    <div class="modal">
      <h2>Create account</h2>
      <p>Pick a <b>unique</b> name. New users start <b>Unverified</b> until an admin verifies you.</p>
      <input id="displayName" placeholder="e.g. Alex" maxlength="24" autocomplete="off" />
      <div style="display:flex; gap:10px; margin-top:12px;">
        <button class="btn" id="saveNameBtn" style="flex:1;">Enter</button>
        <button class="btn ghost" id="signOutBtn" type="button" style="flex:1;">Close</button>
      </div>
      <div class="err" id="nameErr"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, updateDoc,
      collection, addDoc, query, orderBy, onSnapshot,
      serverTimestamp, limit, deleteDoc, runTransaction
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABdyFe7WdhRqvj5alg1yKcS3xOZW5KV0k",
      authDomain: "darkchatroom-4b547.firebaseapp.com",
      projectId: "darkchatroom-4b547",
      storageBucket: "darkchatroom-4b547.firebasestorage.app",
      messagingSenderId: "764781101022",
      appId: "1:764781101022:web:ac3d6ac8e76d4258fda74f",
      measurementId: "G-31LH8LEQ89"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();

    const $ = (id) => document.getElementById(id);

    const statusEl = $("status");
    const mePill = $("mePill");
    const adminPill = $("adminPill");
    const signOutTop = $("signOutTop");

    const messagesEl = $("messages");
    const messageInput = $("messageInput");
    const sendBtn = $("sendBtn");

    const blockedOverlay = $("blockedOverlay");
    const blockedTitle = $("blockedTitle");
    const blockedText = $("blockedText");
    const blockedSignOut = $("blockedSignOut");

    const adminPanel = $("adminPanel");
    const refreshAdmin = $("refreshAdmin");
    const usersList = $("usersList");
    const adminSearch = $("adminSearch");
    const clearSearch = $("clearSearch");

    const nameModal = $("nameModal");
    const displayNameEl = $("displayName");
    const saveNameBtn = $("saveNameBtn");
    const signOutBtn = $("signOutBtn");
    const nameErr = $("nameErr");

    const toast = $("toast");

    // ---- Device ID
    function getDeviceId() {
      const k = "mgc_device_id";
      let v = localStorage.getItem(k);
      if (!v) {
        v = (crypto?.randomUUID ? crypto.randomUUID() : ("dev_" + Math.random().toString(36).slice(2) + Date.now()));
        localStorage.setItem(k, v);
      }
      return v;
    }
    const deviceId = getDeviceId();

    // ---- State
    let me = null;
    let myProfile = null;
    let unsubProfile = null;
    let unsubMessages = null;
    let unsubUsers = null;

    const userCache = new Map();
    let lastMessagesSnapshot = null;
    let liveUsers = [];

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function setErr(text){
      if(!text){ nameErr.style.display = "none"; nameErr.textContent = ""; return; }
      nameErr.style.display = "block";
      nameErr.textContent = text;
    }

    function openNameModal(){
      setErr("");
      displayNameEl.value = "";
      nameModal.classList.add("show");
      setTimeout(() => displayNameEl.focus(), 30);
    }

    function closeNameModal(){ nameModal.classList.remove("show"); }

    function fmtTime(ts){
      if(!ts?.toDate) return "";
      return ts.toDate().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    }

    function escapeHTML(s){
      return String(s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function normalizeName(raw){
      const display = String(raw || "").trim().replace(/\s+/g, " ");
      const key = display.toLowerCase();
      return { display, key };
    }

    function autoScroll(){
      const nearBottom = (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) < 140;
      if(nearBottom) requestAnimationFrame(() => messagesEl.scrollTop = messagesEl.scrollHeight);
    }

    function cleanupSubs(){
      if(unsubProfile){unsubProfile(); unsubProfile=null;}
      if(unsubMessages){unsubMessages(); unsubMessages=null;}
      if(unsubUsers){unsubUsers(); unsubUsers=null;}
      userCache.clear();
      lastMessagesSnapshot = null;
      liveUsers = [];
    }

    function setBlocked(mode){
      if(!mode){
        blockedOverlay.classList.remove("show");
        sendBtn.disabled = false;
        messageInput.disabled = false;
        return;
      }
      blockedTitle.textContent = mode.title;
      blockedText.textContent = mode.text;
      blockedOverlay.classList.add("show");
      sendBtn.disabled = true;
      messageInput.disabled = true;
    }

    function renderMessagesFromSnapshot(qs){
      messagesEl.innerHTML = "";
      let count = 0;

      qs.forEach((d) => {
        const m = d.data();
        count++;

        const time = fmtTime(m.createdAt);
        const u = userCache.get(m.uid) || {};
        const name = escapeHTML(u.displayName || "?");
        const verified = u.verified === true;

        const div = document.createElement("div");
        div.className = "msg";

        const vTag = verified
          ? `<span class="tag v">Verified</span>`
          : `<span class="tag unv">Unverified</span>`;

        const adminTools = (myProfile?.isAdmin === true)
          ? `<div class="adminMsgRow"><button class="btn danger small" data-delmsg="${d.id}">Delete</button></div>`
          : "";

        div.innerHTML = `
          <div class="meta">
            <div class="nameRow"><span class="name">${name}</span>${vTag}</div>
            <div>${time}</div>
          </div>
          <div class="text">${escapeHTML(m.text || "")}</div>
          ${adminTools}
        `;

        messagesEl.appendChild(div);
      });

      statusEl.textContent = `Live • ${count} loaded`;
      autoScroll();
    }

    // ----------------------
    // Admin panel render (live list, no reload)
    // ----------------------
    function renderAdminUsers() {
      if (!myProfile?.isAdmin) return;

      const users = Array.isArray(liveUsers) ? [...liveUsers] : [];
      const q = (adminSearch.value || "").trim().toLowerCase();

      const filtered = q
        ? users.filter(u =>
            String(u.displayName || "").toLowerCase().includes(q) ||
            String(u.uid || u.id || "").toLowerCase().includes(q)
          )
        : users;

      filtered.sort((a, b) => {
        const av = a.verified ? 1 : 0;
        const bv = b.verified ? 1 : 0;
        if (av !== bv) return av - bv;
        return String(a.displayName || "").localeCompare(String(b.displayName || ""));
      });

      usersList.innerHTML = "";

      for (const u of filtered) {
        const uid = u.uid || u.id;
        const isMe = (uid === me.uid);

        const flags = [
          u.isAdmin ? "Admin" : null,
          u.verified ? "Verified" : "Unverified",
          u.banned ? "Banned" : null,
          u.loggedOut ? "LoggedOut" : null
        ].filter(Boolean).join(" • ");

        const card = document.createElement("div");
        card.className = "userCard";

        card.innerHTML = `
          <div style="min-width:0;">
            <div class="uName">${escapeHTML(u.displayName || "(no name)")}</div>
            <div class="uMeta">${escapeHTML(String(uid).slice(0, 10))} • ${escapeHTML(flags)}</div>
            <div class="inlineEdit">
              <input data-rename="${uid}" placeholder="New name" maxlength="24" />
              <button class="btn ok small" data-renbtn="${uid}">Rename</button>
            </div>
          </div>

          <div class="uActions">
            <button class="btn ghost small" data-verify="${uid}" data-verifyval="${u.verified ? "0" : "1"}">${u.verified ? "Unverify" : "Verify"}</button>
            <button class="btn ghost small" data-clearlogout="${uid}" ${u.loggedOut ? "" : "disabled"}>Clear logout</button>
            <button class="btn ghost small" data-logout="${uid}" ${isMe ? "disabled" : ""}>Force logout</button>
            <button class="btn ghost small" data-setadmin="${uid}" data-setadminval="${u.isAdmin ? "0" : "1"}" ${isMe ? "disabled" : ""}>
              ${u.isAdmin ? "Remove admin" : "Make admin"}
            </button>
            <button class="btn danger small" data-ban="${uid}" data-banval="${u.banned ? "0" : "1"}">${u.banned ? "Unban" : "Ban"}</button>
          </div>
        `;

        usersList.appendChild(card);
      }
    }

    refreshAdmin.addEventListener("click", renderAdminUsers);
    adminSearch.addEventListener("input", renderAdminUsers);
    clearSearch.addEventListener("click", () => { adminSearch.value = ""; renderAdminUsers(); });

    // ----------------------
    // Auth bootstrap
    // ----------------------
    onAuthStateChanged(auth, async (user) => {
      cleanupSubs();
      me = user || null;
      myProfile = null;

      if(!user){
        statusEl.textContent = "Signing in…";
        mePill.textContent = "Not signed in";
        adminPill.style.display = "none";
        adminPanel.style.display = "none";
        signOutTop.style.display = "none";
        setBlocked(null);
        await signInAnonymously(auth);
        return;
      }

      // device ban check
      try{
        const banSnap = await getDoc(doc(db, "bannedDevices", deviceId));
        if(banSnap.exists() && banSnap.data()?.banned === true){
          statusEl.textContent = "Blocked";
          mePill.textContent = "Banned device";
          adminPill.style.display = "none";
          adminPanel.style.display = "none";
          signOutTop.style.display = "none";
          setBlocked({ title: "Banned", text: "This device is banned. You cannot rejoin." });
          return;
        }
      }catch(e){ console.error(e); }

      // load profile
      const uref = doc(db, "users", user.uid);
      const snap = await getDoc(uref);

      if(!snap.exists()){
        mePill.textContent = "Choose a name";
        openNameModal();
      }else{
        myProfile = snap.data();
        mePill.textContent = "You: " + (myProfile.displayName || "?");
        closeNameModal();
      }

      // watch my profile
      unsubProfile = onSnapshot(uref, (s) => {
        if(!s.exists()) return;
        myProfile = s.data();

        mePill.textContent = "You: " + (myProfile.displayName || "?");

        if(myProfile.isAdmin){
          adminPill.style.display = "inline-block";
          adminPanel.style.display = "flex";
          signOutTop.style.display = "inline-block"; // admin-only signout
          renderAdminUsers();
        }else{
          adminPill.style.display = "none";
          adminPanel.style.display = "none";
          signOutTop.style.display = "none";
        }

        if(myProfile.banned){
          setBlocked({ title: "Banned", text: "An admin has banned this account/device." });
          return;
        }
        if(myProfile.loggedOut){
          setBlocked({ title: "Logged out", text: "An admin logged you out. Ask an admin to clear it." });
          return;
        }
        setBlocked(null);
      });

      // users cache + live admin list
      unsubUsers = onSnapshot(collection(db, "users"), (qs) => {
        userCache.clear();
        liveUsers = [];

        qs.forEach((d) => {
          const u = d.data();
          const uid = d.id;

          const row = {
            id: uid,
            uid: uid,
            displayName: u.displayName || "",
            verified: u.verified === true,
            banned: u.banned === true,
            loggedOut: u.loggedOut === true,
            isAdmin: u.isAdmin === true,
            deviceId: u.deviceId || null,
            nameKey: u.nameKey || ""
          };

          liveUsers.push(row);

          userCache.set(uid, {
            displayName: row.displayName,
            verified: row.verified,
            banned: row.banned,
            loggedOut: row.loggedOut,
            isAdmin: row.isAdmin,
            deviceId: row.deviceId
          });
        });

        if(lastMessagesSnapshot) renderMessagesFromSnapshot(lastMessagesSnapshot);
        if(myProfile?.isAdmin && adminPanel.style.display !== "none") renderAdminUsers();
      });

      // messages
      const mq = query(collection(db, "messages"), orderBy("createdAt"), limit(200));
      unsubMessages = onSnapshot(mq, (qs) => {
        lastMessagesSnapshot = qs;
        renderMessagesFromSnapshot(qs);
      });

      statusEl.textContent = "Live";
    });

    // signup
    async function saveName(){
      if(!me) return;

      const { display, key } = normalizeName(displayNameEl.value);

      setErr("");
      if(!display) return setErr("Name required.");
      if(display.length < 2) return setErr("Name too short.");
      if(display.length > 24) return setErr("Name too long.");

      saveNameBtn.disabled = true;

      try{
        const uref = doc(db, "users", me.uid);
        const nref = doc(db, "usernames", key);

        await runTransaction(db, async (tx) => {
          const nSnap = await tx.get(nref);
          if(nSnap.exists()) throw new Error("NAME_TAKEN");

          const uSnap = await tx.get(uref);
          const existing = uSnap.exists() ? uSnap.data() : null;

          tx.set(nref, { uid: me.uid, displayName: display, createdAt: serverTimestamp() });

          tx.set(uref, {
            uid: me.uid,
            displayName: display,
            nameKey: key,
            deviceId: deviceId,
            verified: false,
            banned: false,
            loggedOut: false,
            isAdmin: false,
            createdAt: existing?.createdAt || serverTimestamp()
          }, { merge: true });
        });

        closeNameModal();
        showToast("Created. Waiting for verify.");
      }catch(e){
        console.error(e);
        if(String(e?.message || "").includes("NAME_TAKEN")) setErr("That name is already taken.");
        else setErr("Couldn’t create account.");
      }finally{
        saveNameBtn.disabled = false;
      }
    }

    saveNameBtn.addEventListener("click", saveName);
    displayNameEl.addEventListener("keydown", (e) => { if(e.key === "Enter") saveName(); });

    // no user signout
    signOutBtn.addEventListener("click", () => closeNameModal());
    blockedSignOut.addEventListener("click", () => {});

    // admin-only sign out
    signOutTop.addEventListener("click", async () => {
      if(myProfile?.isAdmin) await signOut(auth);
    });

    // send message
    async function send(){
      if(!me) return;
      if(!myProfile?.displayName) return openNameModal();
      if(myProfile.banned || myProfile.loggedOut) return;

      const text = messageInput.value.trim();
      if(!text) return;

      sendBtn.disabled = true;
      try{
        await addDoc(collection(db, "messages"), { uid: me.uid, text, createdAt: serverTimestamp() });
        messageInput.value = "";
      }catch(e){
        console.error(e);
        showToast("Send failed");
      }finally{
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); }
    });

    // actions (no confirm/alert)
    document.addEventListener("click", async (e) => {
      const t = e.target;
      if(!(t instanceof HTMLElement)) return;

      // delete message
      const delId = t.getAttribute("data-delmsg");
      if(delId && myProfile?.isAdmin){
        try{ await deleteDoc(doc(db, "messages", delId)); showToast("Message deleted"); }
        catch(err){ console.error(err); showToast("Delete failed"); }
        return;
      }

      if(!myProfile?.isAdmin) return;

      // verify
      const vUid = t.getAttribute("data-verify");
      if(vUid){
        const val = t.getAttribute("data-verifyval") === "1";
        try{ await updateDoc(doc(db, "users", vUid), { verified: val }); showToast(val ? "Verified" : "Unverified"); }
        catch(err){ console.error(err); showToast("Verify failed"); }
        return;
      }

      // clear logout
      const clrUid = t.getAttribute("data-clearlogout");
      if(clrUid){
        try{ await updateDoc(doc(db, "users", clrUid), { loggedOut: false }); showToast("Logout cleared"); }
        catch(err){ console.error(err); showToast("Clear failed"); }
        return;
      }

      // force logout
      const logoutUid = t.getAttribute("data-logout");
      if(logoutUid){
        try{ await updateDoc(doc(db, "users", logoutUid), { loggedOut: true }); showToast("Forced logout"); }
        catch(err){ console.error(err); showToast("Force logout failed"); }
        return;
      }

      // make/remove admin
      const adminUid = t.getAttribute("data-setadmin");
      if(adminUid){
        const makeAdmin = t.getAttribute("data-setadminval") === "1";
        try{ await updateDoc(doc(db, "users", adminUid), { isAdmin: makeAdmin }); showToast(makeAdmin ? "Admin granted" : "Admin removed"); }
        catch(err){ console.error(err); showToast("Admin change failed"); }
        return;
      }

      // ban/unban (also device ban)
      const banUid = t.getAttribute("data-ban");
      if(banUid){
        const willBan = t.getAttribute("data-banval") === "1";
        try{
          const targetSnap = await getDoc(doc(db, "users", banUid));
          const target = targetSnap.exists() ? targetSnap.data() : null;
          const tDevice = target?.deviceId;

          await updateDoc(doc(db, "users", banUid), { banned: willBan, loggedOut: willBan ? true : false });

          if(tDevice){
            const dref = doc(db, "bannedDevices", tDevice);
            if(willBan) await setDoc(dref, { banned:true, uid: banUid, bannedAt: serverTimestamp() }, { merge:true });
            else await deleteDoc(dref);
          }

          showToast(willBan ? "User banned" : "User unbanned");
        }catch(err){ console.error(err); showToast("Ban/unban failed"); }
        return;
      }

      // rename
      const renUid = t.getAttribute("data-renbtn");
      if(renUid){
        const input = document.querySelector(`input[data-rename="${CSS.escape(renUid)}"]`);
        const { display, key } = normalizeName(input?.value || "");
        if(!display){ showToast("Enter a name"); return; }
        if(display.length < 2 || display.length > 24){ showToast("Name must be 2–24"); return; }

        const uref = doc(db, "users", renUid);
        const newNameRef = doc(db, "usernames", key);

        try{
          await runTransaction(db, async (tx) => {
            const uSnap = await tx.get(uref);
            if(!uSnap.exists()) throw new Error("NO_USER");
            const u = uSnap.data();
            const oldKey = u.nameKey;

            if(oldKey !== key){
              const taken = await tx.get(newNameRef);
              if(taken.exists()) throw new Error("NAME_TAKEN");
              tx.set(newNameRef, { uid: renUid, displayName: display, createdAt: serverTimestamp() });
              if(oldKey) tx.delete(doc(db, "usernames", oldKey));
            }

            tx.set(uref, { displayName: display, nameKey: key }, { merge: true });
          });

          showToast("Username changed");
        }catch(err){
          console.error(err);
          if(String(err?.message||"").includes("NAME_TAKEN")) showToast("Name taken");
          else showToast("Rename failed");
        }
        return;
      }
    });
  </script>
</body>
</html>
